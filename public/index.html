<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gridverse — Real-Time Territory Conquest</title>
  <meta name="description" content="Capture hexagonal tiles in real-time. Compete with players worldwide on a shared hex grid map.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Join Modal ──────────────────────────────────────────── -->
  <div id="join-overlay" class="overlay">
    <div class="join-modal">
      <div class="modal-glow"></div>
      <div class="modal-content">
        <div class="logo-mark">
          <svg viewBox="0 0 60 52" class="hex-logo">
            <polygon points="30,1 56,14 56,38 30,51 4,38 4,14" fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="modal-title">GRIDVERSE</h1>
        <p class="modal-subtitle">Real-time hex territory conquest</p>
        <div class="input-group">
          <input type="text" id="username-input" placeholder="Enter your name..." maxlength="20" autocomplete="off" spellcheck="false">
          <button id="join-btn" class="btn-primary">
            <span>Enter Grid</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
        <div class="modal-hint">
          <span class="hint-dot"></span>
          <span id="online-preview">Connecting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Game UI ──────────────────────────────────────────────── -->
  <div id="game-container" class="hidden">

    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-left">
        <div class="brand">
          <svg viewBox="0 0 60 52" class="hex-icon">
            <polygon points="30,1 56,14 56,38 30,51 4,38 4,14" fill="none" stroke="url(#brandGrad)" stroke-width="2.5"/>
            <defs>
              <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="brand-text">GRIDVERSE</span>
        </div>
      </div>
      <div class="top-center">
        <div id="status-indicator" class="status">
          <span class="status-dot"></span>
          <span class="status-text">Connected</span>
        </div>
      </div>
      <div class="top-right">
        <div class="online-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span id="online-count">0</span> online
        </div>
      </div>
    </header>

    <!-- Main Canvas -->
    <canvas id="grid-canvas"></canvas>

    <!-- Player Info Panel (bottom-left) -->
    <div id="player-panel" class="glass-panel">
      <div class="panel-header">
        <span class="panel-dot" id="player-color-dot"></span>
        <span id="player-name-display" class="panel-title">—</span>
      </div>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-value" id="my-score">0</span>
          <span class="stat-label">Tiles</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="my-rank">—</span>
          <span class="stat-label">Rank</span>
        </div>
      </div>
      <div class="cooldown-bar-container">
        <div class="cooldown-bar" id="cooldown-bar"></div>
      </div>
      <span class="cooldown-label" id="cooldown-label">Ready</span>
    </div>

    <!-- Leaderboard Panel (right) -->
    <div id="leaderboard-panel" class="glass-panel">
      <div class="panel-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
        <span class="panel-title">Leaderboard</span>
      </div>
      <ol id="leaderboard-list" class="leaderboard-list"></ol>
    </div>

    <!-- Controls Hint (bottom-center) -->
    <div id="controls-hint" class="glass-panel controls-hint">
      <span>🖱️ Click to capture</span>
      <span class="hint-sep">·</span>
      <span>Scroll to zoom</span>
      <span class="hint-sep">·</span>
      <span>Drag to pan</span>
    </div>

    <!-- Minimap -->
    <canvas id="minimap-canvas" class="minimap"></canvas>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Zoom controls -->
    <div id="zoom-controls" class="glass-panel zoom-controls">
      <button id="zoom-in-btn" class="zoom-btn" title="Zoom in">+</button>
      <span id="zoom-level" class="zoom-level">100%</span>
      <button id="zoom-out-btn" class="zoom-btn" title="Zoom out">−</button>
      <button id="zoom-reset-btn" class="zoom-btn zoom-reset" title="Reset view">⊙</button>
    </div>

    <!-- Reset Grid button (visible only to admin) -->
    <button id="reset-grid-btn" class="glass-panel reset-grid-btn hidden" title="Clear all tiles and scores (Admin only)">
      👑 Reset Grid
    </button>
  </div>

  <script src="/js/renderer.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
